@if (mammal) {
    <div class="mammals">
        @if (mammal.title){
            <div class="mammal-title">
            <h2> {{ mammal.title }} </h2>
            </div>
        }
        @if (mammal.photo){
        <img class="mammal-photo" alt="Mammal photo" [src]="mammal.photo">
        }
        <div class="mammal-description">
            {{ mammal.description }}
        </div>
    </div>
}
